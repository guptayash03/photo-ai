steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/api:latest'
      - './backend'
    id: 'build-api'

  # Build Worker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/worker:latest'
      - '-f'
      - './backend/Dockerfile.worker'
      - './backend'
    id: 'build-worker'

  # Build Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL='
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL='
      - './frontend'
    id: 'build-frontend'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/api:latest']
    waitFor: ['build-api']
    id: 'push-api'

  # Push Worker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/worker:latest']
    waitFor: ['build-worker']
    id: 'push-worker'

  # Push Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/photoai/frontend:latest']
    waitFor: ['build-frontend']
    id: 'push-frontend'

substitutions:
  _REGION: us-central1

options:
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
